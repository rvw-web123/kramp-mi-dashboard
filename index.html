function App() {

  }, []);

  if (loading) return html`<div style=${{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:C.font,color:C.fgMuted,fontSize:'14px'}}>Loading…</div>`;

  // ===== Flag Icon Component =====
  const Flag = ({code, size}) => {
    const url = flagUrl(code);
    if (!url) return null;
    const cls = size === 'sm' ? 'flag-icon-sm' : 'flag-icon';
    return html`<img class=${cls} src=${url} alt=${code} style=${{marginRight:'8px'}} loading="lazy" />`;
  };

  // ===== Reusable =====
  const MiniSpark = ({values, color, w, h}) => {
    const ww = w || 64, hh = h || 24;
    if (!values||!values.length) return null;
    const mn=Math.min(...values), mx=Math.max(...values), rng=mx-mn||1;
    const pts = values.map((v,i) => '' + ((i/(values.length-1))*ww) + ',' + (hh - ((v-mn)/rng)*hh)).join(' ');
    return html`<svg width=${ww} height=${hh} style=${{display:'block'}}><polyline points=${pts} fill="none" stroke=${color} stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  };

  const TrendChart = ({chartData, height}) => {
    const h = height || 200;
    const canvasRef = useRef(null);
    useEffect(() => {
      if (!canvasRef.current || !chartData) return;
      const ctx2 = canvasRef.current.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvasRef.current.getBoundingClientRect();
      canvasRef.current.width = rect.width * dpr;
      canvasRef.current.height = h * dpr;
      ctx2.scale(dpr, dpr);
      const W = rect.width, H = h;
      ctx2.clearRect(0,0,W,H);
      const d = chartData.data, vals = d.map(p=>p.value);
      const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx-mn||1;
      const padL=48,padR=16,padT=24,padB=36;
      const cw=W-padL-padR, ch=H-padT-padB;
      ctx2.strokeStyle = C.borderLight; ctx2.lineWidth=1;
      for(var i=0;i<5;i++){var y=padT+ch*i/4; ctx2.beginPath();ctx2.moveTo(padL,y);ctx2.lineTo(W-padR,y);ctx2.stroke();
        ctx2.fillStyle=C.fgMuted;ctx2.font='11px Barlow, sans-serif';ctx2.textAlign='right';ctx2.fillText((mx-rng*i/4).toFixed(1),padL-8,y+4);
      }
      if(chartData.neutralLine!==undefined && chartData.neutralLine!==null){var ny=padT+ch*(1-(chartData.neutralLine-mn)/rng);
        ctx2.strokeStyle=C.fgMuted;ctx2.lineWidth=1;ctx2.setLineDash([3,3]);ctx2.beginPath();ctx2.moveTo(padL,ny);ctx2.lineTo(W-padR,ny);ctx2.stroke();ctx2.setLineDash([]);
      }
      d.forEach(function(p,i){var x=padL+cw*i/(d.length-1);ctx2.fillStyle=C.fgMuted;ctx2.font='10px Barlow, sans-serif';ctx2.textAlign='center';ctx2.fillText(p.month,x,H-10);});
      var lastVal = vals[vals.length-1];
      var lineColor = lastVal >= (chartData.neutralLine||0) ? C.accent : C.error;
      ctx2.beginPath();
      d.forEach(function(p,i){var x=padL+cw*i/(d.length-1),y2=padT+ch*(1-(p.value-mn)/rng);i===0?ctx2.moveTo(x,y2):ctx2.lineTo(x,y2);});
      ctx2.lineTo(padL+cw,padT+ch);ctx2.lineTo(padL,padT+ch);ctx2.closePath();
      var grad = ctx2.createLinearGradient(0,padT,0,padT+ch);
      grad.addColorStop(0,lineColor+'20');grad.addColorStop(1,lineColor+'02');
      ctx2.fillStyle=grad;ctx2.fill();
      ctx2.beginPath();
      d.forEach(function(p,i){var x=padL+cw*i/(d.length-1),y2=padT+ch*(1-(p.value-mn)/rng);i===0?ctx2.moveTo(x,y2):ctx2.lineTo(x,y2);});
      ctx2.strokeStyle=lineColor;ctx2.lineWidth=2.5;ctx2.stroke();
      d.forEach(function(p,i){var x=padL+cw*i/(d.length-1),y2=padT+ch*(1-(p.value-mn)/rng);
        ctx2.beginPath();ctx2.arc(x,y2,2.5,0,Math.PI*2);ctx2.fillStyle=lineColor;ctx2.fill();
        if(i===d.length-1){ctx2.beginPath();ctx2.arc(x,y2,6,0,Math.PI*2);ctx2.fillStyle=lineColor+'30';ctx2.fill();
          ctx2.fillStyle=C.fg;ctx2.font='700 13px Barlow, sans-serif';ctx2.textAlign='center';ctx2.fillText(p.value.toString(),x,y2-14);
        }
      });
    }, [chartData]);
    return html`<canvas ref=${canvasRef} style=${{width:'100%',height:h+'px'}}/>`;
  };

  // Multi-series line chart with per-series scaling
  const MultiLineChart = ({chartData, height}) => {
    const h = height || 220;
    const canvasRef = useRef(null);
    useEffect(() => {
      if (!canvasRef.current || !chartData || !chartData.series) return;
      const ctx2 = canvasRef.current.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvasRef.current.getBoundingClientRect();
      canvasRef.current.width = rect.width * dpr;
      canvasRef.current.height = h * dpr;
      ctx2.scale(dpr, dpr);
      const W = rect.width, H = h;
      ctx2.clearRect(0,0,W,H);

      const allSeries = chartData.series;
      const padL=52,padR=80,padT=20,padB=34;
      const cw=W-padL-padR, ch=H-padT-padB;
      const xLabels = allSeries[0].data.map(p=>p.month);
      const N = xLabels.length;

      let globalMin = Infinity, globalMax = -Infinity;
      allSeries.forEach(s => s.data.forEach(p => { globalMin=Math.min(globalMin,p.value); globalMax=Math.max(globalMax,p.value); }));
      const ratio = globalMax / Math.max(0.001, Math.abs(globalMin));
      const normalize = ratio > 5 || (chartData.normalize === true);

      const primary = allSeries[0];
      const primaryVals = primary.data.map(p=>p.value);
      const yMin = normalize ? Math.min(...primaryVals) : globalMin;
      const yMax = normalize ? Math.max(...primaryVals) : globalMax;
      const yRng = yMax - yMin || 1;

      ctx2.strokeStyle = C.borderLight; ctx2.lineWidth=1;
      for(let i=0;i<5;i++){
        const y = padT + ch*i/4;
        ctx2.beginPath();ctx2.moveTo(padL,y);ctx2.lineTo(W-padR,y);ctx2.stroke();
        const labelVal = yMax - yRng*i/4;
        ctx2.fillStyle=C.fgMuted;ctx2.font='10px Barlow, sans-serif';ctx2.textAlign='right';
        ctx2.fillText(labelVal.toFixed(labelVal < 10 ? 1 : 0), padL-8, y+3);
      }

      if (chartData.neutralLine !== undefined && chartData.neutralLine !== null) {
        const ny = padT + ch*(1-(chartData.neutralLine-yMin)/yRng);
        if (ny >= padT && ny <= padT+ch) {
          ctx2.strokeStyle=C.fgMuted;ctx2.lineWidth=1;ctx2.setLineDash([3,3]);
          ctx2.beginPath();ctx2.moveTo(padL,ny);ctx2.lineTo(W-padR,ny);ctx2.stroke();ctx2.setLineDash([]);
          ctx2.fillStyle=C.fgMuted;ctx2.font='9px Barlow, sans-serif';ctx2.textAlign='left';
          ctx2.fillText(chartData.neutralLine, W-padR+4, ny+3);
        }
      }

      xLabels.forEach((m,i) => {
        const x = padL + cw*i/Math.max(1, N-1);
        ctx2.fillStyle=C.fgMuted;ctx2.font='10px Barlow, sans-serif';ctx2.textAlign='center';
        ctx2.fillText(m, x, H-12);
      });

      allSeries.forEach((s, sIdx) => {
        const vals = s.data.map(p=>p.value);
        const sMin = normalize ? Math.min(...vals) : yMin;
        const sMax = normalize ? Math.max(...vals) : yMax;
        const sRng = sMax - sMin || 1;

        ctx2.beginPath();
        s.data.forEach((p,i) => {
          const x = padL + cw*i/Math.max(1, N-1);
          const y = padT + ch*(1 - (p.value-sMin)/sRng);
          i===0 ? ctx2.moveTo(x,y) : ctx2.lineTo(x,y);
        });
        ctx2.strokeStyle = s.color;
        ctx2.lineWidth = 2.5;
        ctx2.stroke();

        s.data.forEach((p,i) => {
          const x = padL + cw*i/Math.max(1, N-1);
          const y = padT + ch*(1 - (p.value-sMin)/sRng);
          ctx2.beginPath();ctx2.arc(x,y,2.5,0,Math.PI*2);ctx2.fillStyle=s.color;ctx2.fill();
        });

        const lastIdx = s.data.length - 1;
        const lastX = padL + cw*lastIdx/Math.max(1, N-1);
        const lastY = padT + ch*(1 - (s.data[lastIdx].value-sMin)/sRng);
        ctx2.beginPath();ctx2.arc(lastX, lastY, 5, 0, Math.PI*2);ctx2.fillStyle=s.color+'40';ctx2.fill();
        ctx2.fillStyle=s.color;ctx2.font='700 11px Barlow, sans-serif';ctx2.textAlign='left';
        const labelVal = s.data[lastIdx].value;
        ctx2.fillText(labelVal.toFixed(labelVal < 10 ? 1 : 0), lastX+8, lastY+4);
      });
    }, [chartData]);
    return html`
      <canvas ref=${canvasRef} style=${{width:'100%',height:h+'px',display:'block'}}/>
      <div style=${{display:'flex',gap:'16px',marginTop:'8px',flexWrap:'wrap'}}>
        ${chartData.series.map(s => html`
          <div key=${s.name} style=${{display:'flex',alignItems:'center',gap:'6px',fontSize:'11px',color:C.fgSoft,fontWeight:'500'}}>
            <div style=${{width:'12px',height:'2px',background:s.color,borderRadius:'2px'}}></div>
            ${s.name}
          </div>
        `)}
      </div>
    `;
  };

  // ===== Styles =====
  var navItem = function(active) { return { padding:'11px 18px', margin:'2px 12px', borderRadius:'10px', cursor:'pointer', display:'flex', alignItems:'center', gap:'12px', fontSize:'14px', fontWeight: active ? '600' : '500', color: active ? '#fff' : C.fg, background: active ? C.accent : 'transparent', transition:'all 0.15s', letterSpacing:'-0.005em', lineHeight:'1.4' }; };

  // Building permits area chart (simple)
  var PermitsChart = function({series, height}) {
    var h = height || 160;
    var canvasRef = useRef(null);
    useEffect(function() {
      if (!canvasRef.current || !series || !series.length) return;
      var ctx2 = canvasRef.current.getContext('2d');
      var dpr = window.devicePixelRatio || 1;
      var rect = canvasRef.current.getBoundingClientRect();
      canvasRef.current.width = rect.width * dpr;
      canvasRef.current.height = h * dpr;
      ctx2.scale(dpr, dpr);
      var W = rect.width, H = h;
      ctx2.clearRect(0,0,W,H);
      var vals = series.map(function(p){return p.value});
      var mn = Math.min.apply(null, vals.concat([95])), mx = Math.max.apply(null, vals.concat([105]));
      var rng = mx - mn || 1;
      var padL=40, padR=12, padT=14, padB=26;
      var cw = W-padL-padR, ch = H-padT-padB;
      // gridlines
      ctx2.strokeStyle = C.borderLight; ctx2.lineWidth = 1;
      for(var i=0;i<4;i++){ var y=padT+ch*i/3; ctx2.beginPath();ctx2.moveTo(padL,y);ctx2.lineTo(W-padR,y);ctx2.stroke();
        ctx2.fillStyle=C.fgMuted;ctx2.font='9px Barlow, sans-serif';ctx2.textAlign='right';
        ctx2.fillText(Math.round(mx-rng*i/3).toString(), padL-6, y+3);
      }
      // baseline 100
      if (mn <= 100 && mx >= 100) {
        var yb = padT + ch*(1-(100-mn)/rng);
        ctx2.strokeStyle = C.fgMuted; ctx2.setLineDash([3,3]); ctx2.beginPath();
        ctx2.moveTo(padL,yb); ctx2.lineTo(W-padR,yb); ctx2.stroke(); ctx2.setLineDash([]);
      }
      // x labels
      series.forEach(function(p,i){
        var x = padL + cw*i/(series.length-1);
        ctx2.fillStyle=C.fgMuted;ctx2.font='9px Barlow, sans-serif';ctx2.textAlign='center';
        ctx2.fillText(p.month, x, H-10);
      });
      // line & fill
      var lineColor = vals[vals.length-1] >= 100 ? C.success : C.error;
      ctx2.beginPath();
      series.forEach(function(p,i){
        var x = padL + cw*i/(series.length-1);
        var y = padT + ch*(1-(p.value-mn)/rng);
        i===0 ? ctx2.moveTo(x,y) : ctx2.lineTo(x,y);
      });
      ctx2.lineTo(padL+cw, padT+ch); ctx2.lineTo(padL, padT+ch); ctx2.closePath();
      var grad = ctx2.createLinearGradient(0,padT,0,padT+ch);
      grad.addColorStop(0, lineColor+'30'); grad.addColorStop(1, lineColor+'02');
      ctx2.fillStyle = grad; ctx2.fill();
      ctx2.beginPath();
      series.forEach(function(p,i){
        var x = padL + cw*i/(series.length-1);
        var y = padT + ch*(1-(p.value-mn)/rng);
        i===0 ? ctx2.moveTo(x,y) : ctx2.lineTo(x,y);
      });
      ctx2.strokeStyle = lineColor; ctx2.lineWidth = 2.5; ctx2.stroke();
      // dots
      series.forEach(function(p,i){
        var x = padL + cw*i/(series.length-1);
        var y = padT + ch*(1-(p.value-mn)/rng);
        ctx2.beginPath(); ctx2.arc(x,y,2.5,0,Math.PI*2); ctx2.fillStyle=lineColor; ctx2.fill();
      });
    }, [series]);
    return html`<canvas ref=${canvasRef} style=${{width:'100%',height:h+'px',display:'block'}}/>`;
  };

              <!-- C. Main signal card -->
              ${msd && msd.title && html`
                <div style=${{...card,borderLeft:'4px solid '+msTypeColor}}>
                  <div style=${{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px',flexWrap:'wrap'}}>
                    <span style=${{fontSize:'10px',fontWeight:'700',color:msTypeColor,textTransform:'uppercase',letterSpacing:'0.08em'}}>Main signal</span>
                    <span style=${{...badge(msTypeColor),fontSize:'10px'}}>${msd.type}</span>

                  <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px'}}>
                    ${msd.interpretation && html`
                      <div>
                        <div style=${{fontSize:'11px',fontWeight:'700',color:C.fgMuted,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'4px'}}>Interpretation</div>
                        <div style=${{fontSize:'13px',color:C.fgSoft,lineHeight:'1.55'}}>${msd.interpretation}</div>
                      </div>
                    `}
                    ${msd.suggestedAction && html`
                      <div style=${{background:C.accentSoft,borderRadius:'10px',padding:'10px 12px'}}>
                        <div style=${{fontSize:'11px',fontWeight:'700',color:C.accent,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'4px'}}>Suggested Kramp action</div>
                        <div style=${{fontSize:'13px',color:C.fg,lineHeight:'1.55',fontWeight:'500'}}>${msd.suggestedAction}</div>
                      </div>
                    `}
                  </div>
                </div>
              `}

              <!-- D. Timeline graph with timeframe switcher -->
              ${trendsChart && html`
                <div style=${card}>
                  <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'12px',gap:'8px',flexWrap:'wrap'}}>
                    <div>
                      <div style=${{fontWeight:'700',fontSize:'15px',letterSpacing:'-0.01em'}}>Real-time search demand \u2014 ${c.name}</div>
                      <div style=${{fontSize:'12px',color:C.fgMuted,marginTop:'2px',fontWeight:'500'}}>Google Trends / Google Search Console (indexed 0-100)</div>
                    </div>
                    <div style=${{display:'flex',gap:'4px',background:C.bg,borderRadius:'10px',padding:'3px'}}>
                      ${[{k:'30d',l:'30D'},{k:'90d',l:'90D'},{k:'12m',l:'12M'},{k:'24m',l:'24M'}].map(function(t){
                        var active = countryTimeframe===t.k;
                        return html`<button key=${t.k} onClick=${function(){setCountryTimeframe(t.k)}} style=${{padding:'5px 12px',borderRadius:'8px',border:'none',cursor:'pointer',fontSize:'11px',fontWeight:'700',background:active?C.cardBg:'transparent',color:active?C.fg:C.fgMuted,boxShadow:active?SHADOW_SM:'none',transition:'all 0.15s'}}>${t.l}</button>`;
                      })}
                    </div>
                  </div>
                  <${MultiLineChart} chartData=${trendsChart} height=${240} />
                  <div style=${{marginTop:'10px',fontSize:'11px',color:C.fgMuted,fontWeight:'500',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'6px'}}>
                    <span>Tracked queries: tractor parts, mini excavator parts, mower blades, hydraulic cylinders, robot mower, chainsaw parts, hedge trimmer parts</span>
                    <a href="https://trends.google.com/" target="_blank" rel="noopener" style=${{color:C.link,textDecoration:'none',fontWeight:'600'}}>Google Trends \u2197</a>
                  </div>
                </div>
              `}

              <!-- E. Market indicators -->
              <div style=${card}>
                <div style=${{fontWeight:'700',fontSize:'15px',marginBottom:'4px'}}>Market indicators</div>
                <div style=${{fontSize:'12px',color:C.fgMuted,fontWeight:'500',marginBottom:'14px'}}>Latest values per Kramp segment, sourced from public datasets</div>

                <!-- Agriculture indicators -->
                <div style=${{fontSize:'11px',fontWeight:'700',color:C.fgMuted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'8px',marginTop:'4px'}}>Agriculture</div>
                <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))',gap:'10px',marginBottom:'18px'}}>
                  <div style=${{padding:'14px 16px',background:C.cardBg,borderRadius:'12px',boxShadow:SHADOW_SM,border:'1px solid '+C.border}}>
                    <div style=${{fontSize:'11px',color:C.fgMuted,fontWeight:'600',textTransform:'uppercase',letterSpacing:'0.06em'}}>Tractor registrations</div>
                    <div style=${{display:'flex',alignItems:'baseline',gap:'8px',marginTop:'4px'}}>
                      <span style=${{fontSize:'22px',fontWeight:'700',letterSpacing:'-0.02em'}}>${c.tractorReg&&c.tractorReg.value||'\u2014'}</span>
                      ${c.tractorReg && html`<span style=${{fontSize:'12px',color:c.tractorReg.yoy>=0?C.success:C.error,fontWeight:'700'}}>${(c.tractorReg.yoy>0?'+':'')+c.tractorReg.yoy}% YoY</span>`}
                    </div>
                    <div style=${{fontSize:'10px',color:C.fgMuted,marginTop:'6px',fontWeight:'500'}}>Source: ${(c.tractorReg&&c.tractorReg.source)||'CEMA / national bodies'}</div>
                  </div>
                  ${indicatorCard('Tractor parts search', seriesByName['tractor parts'], 'Google Trends')}
                  ${indicatorCard('Hydraulic cylinders search', seriesByName['hydraulic cylinders'], 'Google Trends')}
                </div>

                <!-- Construction indicators -->
                <div style=${{fontSize:'11px',fontWeight:'700',color:C.fgMuted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'8px'}}>Construction / Small Earth-Moving</div>
                <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))',gap:'10px',marginBottom:'18px'}}>
                  <div style=${{padding:'14px 16px',background:C.cardBg,borderRadius:'12px',boxShadow:SHADOW_SM,border:'1px solid '+C.border}}>
                    <div style=${{fontSize:'11px',color:C.fgMuted,fontWeight:'600',textTransform:'uppercase',letterSpacing:'0.06em'}}>Building permits</div>
                    <div style=${{display:'flex',alignItems:'baseline',gap:'8px',marginTop:'4px'}}>
                      <span style=${{fontSize:'22px',fontWeight:'700',letterSpacing:'-0.02em'}}>${permitsSeries.length?permitsSeries[permitsSeries.length-1].value:'\u2014'}</span>
                      ${c.buildingPermits && html`<span style=${{fontSize:'12px',color:c.buildingPermits.yoy>=0?C.success:C.error,fontWeight:'700'}}>${(c.buildingPermits.yoy>0?'+':'')+c.buildingPermits.yoy}% YoY</span>`}
                    </div>
                    <div style=${{fontSize:'10px',color:C.fgMuted,marginTop:'6px',fontWeight:'500'}}>Source: ${(c.buildingPermits&&c.buildingPermits.source)||'Eurostat sts_cobp_a'}</div>
                  </div>
                  ${indicatorCard('Mini excavator parts search', seriesByName['mini excavator parts'], 'Google Trends')}
                  ${seriesByName['hydraulic cylinders'] && indicatorCard('Hydraulic cylinders demand', seriesByName['hydraulic cylinders'], 'Google Trends')}
                </div>

                <!-- F&L indicators -->
                <div style=${{fontSize:'11px',fontWeight:'700',color:C.fgMuted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'8px'}}>Forest & Landscaping</div>
                <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))',gap:'10px',marginBottom:'4px'}}>
                  ${indicatorCard('Mower blades search', seriesByName['mower blades'], 'Google Trends')}
                  ${seriesByName['chainsaw parts'] && indicatorCard('Chainsaw parts search', seriesByName['chainsaw parts'], 'Google Trends')}
                  ${seriesByName['robot mower'] && indicatorCard('Robot mower search', seriesByName['robot mower'], 'Google Trends')}
                  ${seriesByName['hedge trimmer parts'] && indicatorCard('Hedge trimmer parts search', seriesByName['hedge trimmer parts'], 'Google Trends')}
                  <div style=${{padding:'14px 16px',background:C.surface,borderRadius:'12px',boxShadow:SHADOW_SM,border:'1px solid '+C.border}}>
                    <div style=${{fontSize:'11px',color:C.fgMuted,fontWeight:'600',textTransform:'uppercase',letterSpacing:'0.06em'}}>EGMF survey signal</div>
                    <div style=${{fontSize:'14px',fontWeight:'700',marginTop:'4px',color:dirColor(segMom.forestLandscaping.direction)}}>${segMom.forestLandscaping.direction==='up'?'Positive':segMom.forestLandscaping.direction==='down'?'Negative':'Stable'}</div>
                    <div style=${{fontSize:'11px',color:C.fgSoft,marginTop:'4px',lineHeight:'1.4'}}>${segMom.forestLandscaping.mainDriver}</div>
                    <div style=${{fontSize:'10px',color:C.fgMuted,marginTop:'6px',fontWeight:'500'}}>Source: EGMF Market Survey (annual)</div>
                  </div>
                </div>
              </div>

              <!-- Building permits chart -->
              ${permitsSeries.length>0 && html`
                <div style=${card}>
                  <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'12px',gap:'8px'}}>
                    <div>
                      <div style=${{fontWeight:'700',fontSize:'15px',letterSpacing:'-0.01em'}}>Building permits \u2014 ${c.name}</div>
                      <div style=${{fontSize:'12px',color:C.fgMuted,marginTop:'2px',fontWeight:'500'}}>Eurostat sts_cobp_a (index, 2021 = 100) \u00B7 ${(c.buildingPermits.yoy>0?'+':'')+c.buildingPermits.yoy}% YoY</div>
                    </div>
                    <span style=${{display:'inline-flex',alignItems:'center',gap:'5px',padding:'3px 10px',borderRadius:'20px',fontSize:'10px',fontWeight:'700',background:C.success+'14',color:C.success,textTransform:'uppercase',letterSpacing:'0.06em',whiteSpace:'nowrap',flexShrink:0}}><span style=${{width:'6px',height:'6px',borderRadius:'50%',background:C.success}}></span>Live</span>
                  </div>
                  <${PermitsChart} series=${permitsSeries} height=${180} />
                  <div style=${{marginTop:'8px',fontSize:'12px'}}>
                    <a href="https://ec.europa.eu/eurostat/databrowser/view/sts_cobp_a/default/table" target="_blank" rel="noopener" style=${{color:C.link,textDecoration:'none',fontWeight:'600'}}>${c.buildingPermits.source} \u2197</a>
                  </div>
                </div>
              `}

              <!-- G. So what for Kramp? -->
              ${c.commercialImplications && c.commercialImplications.length>0 && html`
                <div style=${{...card,background:C.navy,color:'#fff',borderRadius:'16px'}}>
                  <div style=${{display:'flex',alignItems:'center',gap:'10px',marginBottom:'4px'}}>
                    <span style=${{width:'28px',height:'28px',borderRadius:'8px',background:C.accent,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:'800',fontSize:'14px'}}>K</span>
                    <div style=${{fontWeight:'700',fontSize:'16px',letterSpacing:'-0.01em'}}>So what for Kramp?</div>
                  </div>
                  <div style=${{fontSize:'12px',color:'rgba(255,255,255,0.65)',fontWeight:'500',marginBottom:'14px'}}>Recommended actions for ${c.name}</div>
                  <ol style=${{margin:0,paddingLeft:'20px',display:'flex',flexDirection:'column',gap:'10px'}}>
                    ${c.commercialImplications.map(function(action,i){ return html`
                      <li key=${i} style=${{fontSize:'13px',color:'rgba(255,255,255,0.95)',lineHeight:'1.6'}}>${action}</li>
                    `})}
                  </ol>
                </div>
              `}

              <!-- Competitors -->
              <div style=${card}>
                <div style=${{fontWeight:'700',fontSize:'15px',marginBottom:'10px'}}>Top Competitors in ${c.name}</div>
                <div style=${{display:'flex',gap:'8px',flexWrap:'wrap'}}>
                  ${c.competitors.map(function(comp){ return html`<span key=${comp} style=${{padding:'6px 14px',borderRadius:'20px',fontSize:'12px',background:comp==='Kramp'?C.accent:C.bg,color:comp==='Kramp'?'#fff':C.fgSoft,fontWeight:'600'}}>${comp}</span>`; })}
                </div>
                <div style=${{fontSize:'11px',color:C.fgMuted,marginTop:'12px',fontWeight:'500'}}>Source: ${c.marketSource}</div>
              </div>

            </div>

            <!-- F. Right column: country-specific news feed -->
            <div style=${{minWidth:0,display:'flex',flexDirection:'column',gap:'12px'}}>
              <div style=${{...card,padding:'18px 20px'}}>
                <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}}>
                  <div style=${{fontWeight:'700',fontSize:'15px'}}>Country-specific news feed</div>
                  <span style=${{fontSize:'11px',color:C.fgMuted,fontWeight:'600'}}>${newsList.length} items</span>
                </div>
                <div style=${{fontSize:'12px',color:C.fgMuted,fontWeight:'500',marginBottom:'12px'}}>Latest signals tagged for ${c.name}</div>
                ${newsList.length===0 && html`<div style=${{padding:'24px',textAlign:'center',color:C.fgMuted,fontSize:'13px'}}>No signals tracked yet for this country.</div>`}
                <div style=${{maxHeight:'820px',overflowY:'auto',paddingRight:'4px',marginRight:'-4px'}}>
                  ${newsList.map(function(item,i){
                    var tcol = item.type==='Threat'?C.error:item.type==='Opportunity'?C.success:C.warning;
                    return html`
                      <div key=${i} style=${{padding:'14px 0',borderBottom:'1px solid '+C.borderLight}}>
                        <div style=${{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px',flexWrap:'wrap'}}>
                          <span style=${{fontSize:'10px',fontWeight:'700',color:C.fgMuted,textTransform:'uppercase',letterSpacing:'0.06em'}}>${item.segment}</span>
                          <span style=${{color:C.fgMuted}}>|</span>
                          <span style=${{...badge(tcol),fontSize:'10px'}}>${item.type}</span>
                          <span style=${{fontSize:'11px',color:C.fgMuted,marginLeft:'auto'}}>${ago(item.date)}</span>
                        </div>
                        <div style=${{fontSize:'13px',fontWeight:'600',letterSpacing:'-0.005em',lineHeight:'1.4',marginBottom:'5px'}}>${item.headline}</div>
                        <div style=${{fontSize:'12px',color:C.fgSoft,lineHeight:'1.5',marginBottom:'6px'}}>${item.summary}</div>
                        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
                          <a href=${item.url} target="_blank" rel="noopener" style=${{color:C.link,textDecoration:'none',fontSize:'11px',fontWeight:'600'}}>${item.source} \u2197</a>
                        </div>
                      </div>
                    `;
                  })}
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // === GRID VIEW ===
    var allClusters = ['all'].concat(Array.from(new Set(data.countries.map(function(c2){return c2.cluster}))).sort());
    var allSegments = [{k:'all',l:'All segments'},{k:'agri',l:'Agriculture'},{k:'construction',l:'Construction'},{k:'fl',l:'Forest & Landscaping'}];
    var allSignals = [{k:'all',l:'All signals'},{k:'Threat',l:'Threats'},{k:'Opportunity',l:'Opportunities'},{k:'Neutral',l:'Neutral'}];
    var allPriorities = [{k:'all',l:'All'},{k:'High',l:'High'},{k:'Medium',l:'Medium'},{k:'Low',l:'Low'}];
    var sortOpts = [
      {k:'priority',l:'Priority score'},
      {k:'market',l:'Market size'},
      {k:'signals',l:'Active signals'},
      {k:'momentum',l:'Momentum'},
      {k:'name',l:'Country name'}
    ];

    // Apply filters
    var filtered = data.countries.filter(function(c2){
      if (countryRegionFilter!=='all' && c2.cluster!==countryRegionFilter) return false;
      if (countryPriorityFilter!=='all' && c2.priority!==countryPriorityFilter) return false;
      if (countrySegmentFilter!=='all') {
        // Only show countries where the chosen segment has notable momentum (up or down)
        var d = (c2.momentum && c2.momentum.detail) || {};
        var segObj = countrySegmentFilter==='agri'?d.agri : countrySegmentFilter==='construction'?d.construction : countrySegmentFilter==='fl'?d.forestLandscaping : null;
        if (!segObj || segObj.direction==='flat') return false;
      }
      if (countrySignalFilter!=='all') {
        var msd2 = c2.mainSignalDetail;
        if (!msd2 || msd2.type!==countrySignalFilter) return false;
      }
      return true;
    });

    // Apply sorting
    var sorted = filtered.slice().sort(function(a,b){
      switch(countrySortBy){
        case 'market': return (b.marketSizeEstimate||b.market)-(a.marketSizeEstimate||a.market);
        case 'signals': return (b.activeSignals||b.signals)-(a.activeSignals||a.signals);
        case 'momentum': {
          var mScore = function(c3){ var d=(c3.momentum&&c3.momentum.detail)||{}; var sc=0; ['agri','construction','forestLandscaping'].forEach(function(k){ var v=d[k]; if(!v) return; sc += v.direction==='up'?1:v.direction==='down'?-1:0; }); return sc; };
          return mScore(b)-mScore(a);
        }
        case 'name': return a.name.localeCompare(b.name);
        case 'priority':
        default: return (b.priorityScore||0)-(a.priorityScore||0);
      }
    });

    // For pill counts
    var clusterCounts = {};
    data.countries.forEach(function(c2){ clusterCounts[c2.cluster] = (clusterCounts[c2.cluster]||0)+1; });

    // Select styles
    var selectStyle = { padding:'8px 14px',border:'1px solid '+C.border,borderRadius:'10px',fontSize:'13px',fontWeight:'500',background:C.cardBg,color:C.fg,cursor:'pointer',outline:'none',fontFamily:C.font };

    return html`
      <div>
        <h1 style=${sTitle}>Country Deep Dive</h1>
        <p style=${sSub}>Interactive country intelligence across ${data.countries.length} European markets. Click a country card to open the full intelligence view: segment momentum, main signal, search demand timeline, market indicators, news, and recommended Kramp actions.</p>

        <!-- Top filter & sort bar -->
        <div style=${{display:'flex',flexDirection:'column',gap:'12px',padding:'16px 18px',background:C.cardBg,borderRadius:'14px',marginBottom:'12px',boxShadow:SHADOW_SM}}>

          <!-- Cluster pills row -->
          <div style=${{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
            <span style=${{fontSize:'11px',fontWeight:'700',color:C.fgMuted,textTransform:'uppercase',letterSpacing:'0.08em',marginRight:'4px'}}>Cluster</span>
            ${allClusters.map(function(r){
              var n = r==='all' ? data.countries.length : (clusterCounts[r]||0);
              return html`<button key=${r} style=${pillBtn(countryRegionFilter===r)} onClick=${function(){setCountryRegionFilter(r)}}>${r==='all' ? 'All' : r} <span style=${{opacity:0.7,marginLeft:'4px'}}>(${n})</span></button>`;
            })}
          </div>

          <!-- Selects row -->
          <div style=${{display:'flex',alignItems:'center',gap:'14px',flexWrap:'wrap'}}>
            <div style=${{display:'flex',alignItems:'center',gap:'6px'}}>
              <span style=${{fontSize:'11px',fontWeight:'700',color:C.fgMuted,textTransform:'uppercase',letterSpacing:'0.08em'}}>Segment</span>
              <select value=${countrySegmentFilter} onChange=${function(e){setCountrySegmentFilter(e.target.value)}} style=${selectStyle}>
                ${allSegments.map(function(o){ return html`<option key=${o.k} value=${o.k}>${o.l}</option>`; })}
              </select>
            </div>
            <div style=${{display:'flex',alignItems:'center',gap:'6px'}}>
              <span style=${{fontSize:'11px',fontWeight:'700',color:C.fgMuted,textTransform:'uppercase',letterSpacing:'0.08em'}}>Signal type</span>
              <select value=${countrySignalFilter} onChange=${function(e){setCountrySignalFilter(e.target.value)}} style=${selectStyle}>
                ${allSignals.map(function(o){ return html`<option key=${o.k} value=${o.k}>${o.l}</option>`; })}
              </select>
            </div>
            <div style=${{display:'flex',alignItems:'center',gap:'6px'}}>
              <span style=${{fontSize:'11px',fontWeight:'700',color:C.fgMuted,textTransform:'uppercase',letterSpacing:'0.08em'}}>Priority</span>
              <select value=${countryPriorityFilter} onChange=${function(e){setCountryPriorityFilter(e.target.value)}} style=${selectStyle}>
                ${allPriorities.map(function(o){ return html`<option key=${o.k} value=${o.k}>${o.l}</option>`; })}
              </select>
            </div>
            <div style=${{display:'flex',alignItems:'center',gap:'6px',marginLeft:'auto'}}>
              <span style=${{fontSize:'11px',fontWeight:'700',color:C.fgMuted,textTransform:'uppercase',letterSpacing:'0.08em'}}>Sort by</span>
              <select value=${countrySortBy} onChange=${function(e){setCountrySortBy(e.target.value)}} style=${selectStyle}>
                ${sortOpts.map(function(o){ return html`<option key=${o.k} value=${o.k}>${o.l}</option>`; })}
              </select>
            </div>
          </div>

        <h1 style=${sTitle}>Sources & References</h1>
        <p style=${sSub}>Every insight in this dashboard is traced back to a specific source. Below is the complete registry of ${data.sources.length} verified public sources with direct links to the original data.</p>

        <div style=${{display:'flex',gap:'16px',marginBottom:'28px',flexWrap:'wrap'}}>
          <${KpiMetric} label="Total Sources" value=${data.sources.length} sub="Verified and documented" color=${C.accent} icon="\u2261" />
          <${KpiMetric} label="Tier 1 Primary" value=${data.sources.filter(function(s2){return s2.tier===1}).length} sub="Highest reliability" color=${C.success} icon="\u2605" />
          <${KpiMetric} label="Tier 2 Secondary" value=${data.sources.filter(function(s2){return s2.tier===2}).length} sub="High quality" color=${C.warning} icon="\u25C6" />
          <${KpiMetric} label="Categories" value=${Object.keys(catCounts).length} sub="Industry domains" color=${C.navy} icon="\u25A2" />
        </div>

        <div style=${{display:'flex',gap:'10px',marginBottom:'16px',alignItems:'center',flexWrap:'wrap'}}>
          <input placeholder="Search sources…" value=${sourceSearch} onInput=${function(e){setSourceSearch(e.target.value)}} style=${{padding:'10px 18px',border:'1px solid '+C.border,borderRadius:'12px',fontSize:'14px',outline:'none',width:'320px',color:C.fg,background:C.cardBg,boxShadow:SHADOW_SM}} />
        </div>
        <div style=${{display:'flex',gap:'6px',marginBottom:'24px',flexWrap:'wrap'}}>
          <button style=${pillBtn(sourceCat==='all')} onClick=${function(){setSourceCat('all')}}>All (${data.sources.length})</button>
          ${Object.entries(catCounts).sort(function(a,b){return b[1]-a[1]}).map(function(entry) { var cat=entry[0],count=entry[1]; return html`
            <button key=${cat} style=${pillBtn(sourceCat===cat)} onClick=${function(){setSourceCat(sourceCat===cat?'all':cat)}}>${catLabels[cat]||cat} (${count})</button>
          `; })}
        </div>

        <div style=${{fontSize:'13px',color:C.fgMuted,marginBottom:'20px',fontWeight:'500'}}>Showing ${filtered4.length} of ${data.sources.length} sources</div>

        ${Object.entries(grouped).map(function(entry) { var cat=entry[0], sources=entry[1]; return html`
          <div key=${cat} style=${{marginBottom:'32px'}}>
            <h2 style=${{fontSize:'18px',fontWeight:'700',letterSpacing:'-0.015em',marginBottom:'4px'}}>${catLabels[cat]||cat}</h2>
            <div style=${{fontSize:'13px',color:C.fgMuted,marginBottom:'12px',fontWeight:'500'}}>${sources.length} sources</div>

            ${sources.map(function(src) { return html`
              <div key=${src.id} style=${{...card,marginBottom:'10px',cursor:'pointer'}} onClick=${function(){setExpandedSource(expandedSource===src.id?null:src.id)}}>
                <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'20px'}}>
                  <div style=${{flex:1,minWidth:0}}>
                    <div style=${{display:'flex',alignItems:'center',gap:'10px',marginBottom:'4px',flexWrap:'wrap'}}>
                      <span style=${{fontWeight:'700',fontSize:'15px'}}>${src.name}</span>
                      <span style=${{...badge(tierColor(src.tier)),fontSize:'10px'}}>Tier ${src.tier}</span>
                      <span style=${{fontSize:'12px',color:C.fgMuted,fontWeight:'500'}}>${src.type}</span>
                    </div>
                    <div style=${{fontSize:'14px',color:C.fgSoft,lineHeight:'1.6',marginBottom:'8px'}}>${src.description}</div>
                    <div style=${{display:'flex',alignItems:'center',gap:'16px',fontSize:'12px',color:C.fgMuted,flexWrap:'wrap',fontWeight:'500'}}>
                      <span>${src.coverage}</span>
                      <span>Refresh: ${src.frequency}</span>
                      <span>Reliability: ${src.reliability}/5</span>
                      <span style=${{color:src.access==='Public'?C.success:C.warning,fontWeight:'600'}}>${src.access}</span>
                    </div>
                  </div>
                  <a href=${src.url} target="_blank" rel="noopener" onClick=${function(e){e.stopPropagation()}} style=${{display:'flex',alignItems:'center',gap:'4px',padding:'9px 18px',borderRadius:'10px',background:C.accent,color:'#fff',textDecoration:'none',fontSize:'12px',fontWeight:'600',whiteSpace:'nowrap',flexShrink:0}}>
                    Visit \u2197
                  </a>
                </div>

                ${expandedSource===src.id && html`
                  <div style=${{marginTop:'16px',padding:'20px',background:C.bg,borderRadius:'12px'}}>
                    <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'24px'}}>
                      <div>
                        <div style=${{fontSize:'11px',fontWeight:'700',color:C.fgMuted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'6px'}}>Data Provided</div>
                        <div style=${{fontSize:'13px',lineHeight:'1.6',color:C.fgSoft}}>${src.dataProvided}</div>
                      </div>
                      <div>
                        <div style=${{fontSize:'11px',fontWeight:'700',color:C.fgMuted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'6px'}}>Used For</div>
                        <div style=${{display:'flex',gap:'4px',flexWrap:'wrap'}}>
                          ${src.usedFor.map(function(use,i) { return html`<span key=${i} style=${{padding:'4px 10px',borderRadius:'20px',fontSize:'11px',background:C.cardBg,color:C.fgSoft,fontWeight:'500'}}>${use}</span>`; })}
                        </div>
                      </div>
                    </div>
                    <div style=${{marginTop:'12px',fontSize:'12px',color:C.fgSoft}}>
                      Direct link: <a href=${src.url} target="_blank" rel="noopener" style=${{color:C.link,textDecoration:'none',wordBreak:'break-all',fontWeight:'600'}}>${src.url} \u2197</a>
                    </div>
                  </div>
                `}
              </div>
            `; })}
          </div>
        `; })}

        <div style=${{...card,borderLeft:'4px solid '+C.accent,marginTop:'8px'}}>
          <div style=${{fontWeight:'700',fontSize:'15px',marginBottom:'8px'}}>Data Integrity</div>
          <div style=${{fontSize:'14px',color:C.fgSoft,lineHeight:'1.7'}}>
            Every insight in this dashboard is traced back to a specific source with URL, publication date, and reliability rating. <strong>Live</strong> charts pull directly from public APIs (e.g. Eurostat) with 6-hour caching. <strong>Snapshot</strong> charts use manually-curated values from the latest published reports (CEMA, CECE, Google Trends) and are refreshed monthly/quarterly. Tier 1 sources (official associations, government data) are prioritised over Tier 2 (trade media, competitor websites).
          </div>
        </div>
      </div>
    `;
  };

  // Render
  var pages2 = { dashboard: DashboardPage, newsfeed: NewsFeedPage, countries: CountriesPage, competitors: CompetitorsPage, sources: SourcesPage };
  var PageComponent = pages2[page] || DashboardPage;

  return html`
    <div style=${{display:'flex',minHeight:'100vh',background:C.bg,color:C.fg,fontFamily:C.font}}>
      <${SidebarComp} />
      <div style=${{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        <${HeaderComp} />
        <div style=${{flex:1,padding:'24px 40px 48px',overflowY:'auto'}}>
          <div style=${{maxWidth:'1280px',margin:'0 auto'}}>
            <${PageComponent} />
          </div>
        </div>
      </div>
    </div>
  `;
}

render(html`<${App} />`, document.getElementById('root'));
</script>
</body>
</html>
