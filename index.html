function App() {
  const [data, setData] = useState(null);
  const [compData, setCompData] = useState(null);

  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('dashboard');
  const [tab, setTab] = useState('trends');
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [expandedKpi, setExpandedKpi] = useState(null);
  const [signalFilter, setSignalFilter] = useState('all');

  const [sourceFilter, setSourceFilter] = useState('all');
  const [countryDetail, setCountryDetail] = useState(null);
  const [dashFilter, setDashFilter] = useState(null);
  const [expandedSource, setExpandedSource] = useState(null);
  const [sourceCat, setSourceCat] = useState('all');
  const [sourceSearch, setSourceSearch] = useState('');
  const [selCluster, setSelCluster] = useState('all');
  const [selComp, setSelComp] = useState(null);
  const [newsCatFilter, setNewsCatFilter] = useState('all');

  useEffect(() => {
    Promise.all([
      fetch(API+'/kpis').then(r=>r.json()),
      fetch(API+'/competitors').then(r=>r.json()),
      fetch(API+'/signals').then(r=>r.json()),
      fetch(API+'/countries').then(r=>r.json()),
      fetch(API+'/categories').then(r=>r.json()),
      fetch(API+'/momentum').then(r=>r.json()),
      fetch(API+'/sources').then(r=>r.json()),
      fetch(COMP_API+'/landscape').then(r=>r.json()),

    ]).then(([kpis, competitors, signals, countries, categories, momentum, sources, landscape, news]) => {

    }).catch(e => { console.error(e); setLoading(false); });

    // Fetch live Eurostat data separately (non-blocking)
    fetch(EUROSTAT_API).then(r => r.json()).then(d => {
      if (!d.error) setEurostat(d);
    }).catch(e => console.error('Eurostat fetch failed:', e));
  }, []);

  if (loading) return html`<div style=${{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:C.font,color:C.fgMuted,fontSize:'14px'}}>Loading…</div>`;

  // ===== Flag Icon Component =====
  const Flag = ({code, size}) => {
    const url = flagUrl(code);
    if (!url) return null;
    const cls = size === 'sm' ? 'flag-icon-sm' : 'flag-icon';
    return html`<img class=${cls} src=${url} alt=${code} style=${{marginRight:'8px'}} loading="lazy" />`;
  };

  // ===== Reusable =====
  const MiniSpark = ({values, color, w, h}) => {
    const ww = w || 64, hh = h || 24;
    if (!values||!values.length) return null;
    const mn=Math.min(...values), mx=Math.max(...values), rng=mx-mn||1;
    const pts = values.map((v,i) => '' + ((i/(values.length-1))*ww) + ',' + (hh - ((v-mn)/rng)*hh)).join(' ');
    return html`<svg width=${ww} height=${hh} style=${{display:'block'}}><polyline points=${pts} fill="none" stroke=${color} stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  };

  const TrendChart = ({chartData, height}) => {
    const h = height || 200;
    const canvasRef = useRef(null);
    useEffect(() => {
      if (!canvasRef.current || !chartData) return;
      const ctx2 = canvasRef.current.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvasRef.current.getBoundingClientRect();
      canvasRef.current.width = rect.width * dpr;
      canvasRef.current.height = h * dpr;
      ctx2.scale(dpr, dpr);
      const W = rect.width, H = h;
      ctx2.clearRect(0,0,W,H);
      const d = chartData.data, vals = d.map(p=>p.value);
      const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx-mn||1;
      const padL=48,padR=16,padT=24,padB=36;
      const cw=W-padL-padR, ch=H-padT-padB;
      ctx2.strokeStyle = C.borderLight; ctx2.lineWidth=1;
      for(var i=0;i<5;i++){var y=padT+ch*i/4; ctx2.beginPath();ctx2.moveTo(padL,y);ctx2.lineTo(W-padR,y);ctx2.stroke();
        ctx2.fillStyle=C.fgMuted;ctx2.font='11px Barlow, sans-serif';ctx2.textAlign='right';ctx2.fillText((mx-rng*i/4).toFixed(1),padL-8,y+4);
      }
      if(chartData.neutralLine!==undefined && chartData.neutralLine!==null){var ny=padT+ch*(1-(chartData.neutralLine-mn)/rng);
        ctx2.strokeStyle=C.fgMuted;ctx2.lineWidth=1;ctx2.setLineDash([3,3]);ctx2.beginPath();ctx2.moveTo(padL,ny);ctx2.lineTo(W-padR,ny);ctx2.stroke();ctx2.setLineDash([]);
      }
      d.forEach(function(p,i){var x=padL+cw*i/(d.length-1);ctx2.fillStyle=C.fgMuted;ctx2.font='10px Barlow, sans-serif';ctx2.textAlign='center';ctx2.fillText(p.month,x,H-10);});
      var lastVal = vals[vals.length-1];
      var lineColor = lastVal >= (chartData.neutralLine||0) ? C.accent : C.error;
      ctx2.beginPath();
      d.forEach(function(p,i){var x=padL+cw*i/(d.length-1),y2=padT+ch*(1-(p.value-mn)/rng);i===0?ctx2.moveTo(x,y2):ctx2.lineTo(x,y2);});
      ctx2.lineTo(padL+cw,padT+ch);ctx2.lineTo(padL,padT+ch);ctx2.closePath();
      var grad = ctx2.createLinearGradient(0,padT,0,padT+ch);
      grad.addColorStop(0,lineColor+'20');grad.addColorStop(1,lineColor+'02');
      ctx2.fillStyle=grad;ctx2.fill();
      ctx2.beginPath();
      d.forEach(function(p,i){var x=padL+cw*i/(d.length-1),y2=padT+ch*(1-(p.value-mn)/rng);i===0?ctx2.moveTo(x,y2):ctx2.lineTo(x,y2);});
      ctx2.strokeStyle=lineColor;ctx2.lineWidth=2.5;ctx2.stroke();
      d.forEach(function(p,i){var x=padL+cw*i/(d.length-1),y2=padT+ch*(1-(p.value-mn)/rng);
        ctx2.beginPath();ctx2.arc(x,y2,2.5,0,Math.PI*2);ctx2.fillStyle=lineColor;ctx2.fill();
        if(i===d.length-1){ctx2.beginPath();ctx2.arc(x,y2,6,0,Math.PI*2);ctx2.fillStyle=lineColor+'30';ctx2.fill();
          ctx2.fillStyle=C.fg;ctx2.font='700 13px Barlow, sans-serif';ctx2.textAlign='center';ctx2.fillText(p.value.toString(),x,y2-14);
        }
      });
    }, [chartData]);
    return html`<canvas ref=${canvasRef} style=${{width:'100%',height:h+'px'}}/>`;
  };

  // Multi-series line chart with per-series scaling
  const MultiLineChart = ({chartData, height}) => {
    const h = height || 220;
    const canvasRef = useRef(null);
    useEffect(() => {
      if (!canvasRef.current || !chartData || !chartData.series) return;
      const ctx2 = canvasRef.current.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvasRef.current.getBoundingClientRect();
      canvasRef.current.width = rect.width * dpr;
      canvasRef.current.height = h * dpr;
      ctx2.scale(dpr, dpr);
      const W = rect.width, H = h;
      ctx2.clearRect(0,0,W,H);

      const allSeries = chartData.series;
      const padL=52,padR=80,padT=20,padB=34;
      const cw=W-padL-padR, ch=H-padT-padB;
      const xLabels = allSeries[0].data.map(p=>p.month);
      const N = xLabels.length;

      let globalMin = Infinity, globalMax = -Infinity;
      allSeries.forEach(s => s.data.forEach(p => { globalMin=Math.min(globalMin,p.value); globalMax=Math.max(globalMax,p.value); }));
      const ratio = globalMax / Math.max(0.001, Math.abs(globalMin));
      const normalize = ratio > 5 || (chartData.normalize === true);

      const primary = allSeries[0];
      const primaryVals = primary.data.map(p=>p.value);
      const yMin = normalize ? Math.min(...primaryVals) : globalMin;
      const yMax = normalize ? Math.max(...primaryVals) : globalMax;
      const yRng = yMax - yMin || 1;

      ctx2.strokeStyle = C.borderLight; ctx2.lineWidth=1;
      for(let i=0;i<5;i++){
        const y = padT + ch*i/4;
        ctx2.beginPath();ctx2.moveTo(padL,y);ctx2.lineTo(W-padR,y);ctx2.stroke();
        const labelVal = yMax - yRng*i/4;
        ctx2.fillStyle=C.fgMuted;ctx2.font='10px Barlow, sans-serif';ctx2.textAlign='right';
        ctx2.fillText(labelVal.toFixed(labelVal < 10 ? 1 : 0), padL-8, y+3);
      }

      if (chartData.neutralLine !== undefined && chartData.neutralLine !== null) {
        const ny = padT + ch*(1-(chartData.neutralLine-yMin)/yRng);
        if (ny >= padT && ny <= padT+ch) {
          ctx2.strokeStyle=C.fgMuted;ctx2.lineWidth=1;ctx2.setLineDash([3,3]);
          ctx2.beginPath();ctx2.moveTo(padL,ny);ctx2.lineTo(W-padR,ny);ctx2.stroke();ctx2.setLineDash([]);
          ctx2.fillStyle=C.fgMuted;ctx2.font='9px Barlow, sans-serif';ctx2.textAlign='left';
          ctx2.fillText(chartData.neutralLine, W-padR+4, ny+3);
        }
      }

      xLabels.forEach((m,i) => {
        const x = padL + cw*i/Math.max(1, N-1);
        ctx2.fillStyle=C.fgMuted;ctx2.font='10px Barlow, sans-serif';ctx2.textAlign='center';
        ctx2.fillText(m, x, H-12);
      });

      allSeries.forEach((s, sIdx) => {
        const vals = s.data.map(p=>p.value);
        const sMin = normalize ? Math.min(...vals) : yMin;
        const sMax = normalize ? Math.max(...vals) : yMax;
        const sRng = sMax - sMin || 1;

        ctx2.beginPath();
        s.data.forEach((p,i) => {
          const x = padL + cw*i/Math.max(1, N-1);
          const y = padT + ch*(1 - (p.value-sMin)/sRng);
          i===0 ? ctx2.moveTo(x,y) : ctx2.lineTo(x,y);
        });
        ctx2.strokeStyle = s.color;
        ctx2.lineWidth = 2.5;
        ctx2.stroke();

        s.data.forEach((p,i) => {
          const x = padL + cw*i/Math.max(1, N-1);
          const y = padT + ch*(1 - (p.value-sMin)/sRng);
          ctx2.beginPath();ctx2.arc(x,y,2.5,0,Math.PI*2);ctx2.fillStyle=s.color;ctx2.fill();
        });

        const lastIdx = s.data.length - 1;
        const lastX = padL + cw*lastIdx/Math.max(1, N-1);
        const lastY = padT + ch*(1 - (s.data[lastIdx].value-sMin)/sRng);
        ctx2.beginPath();ctx2.arc(lastX, lastY, 5, 0, Math.PI*2);ctx2.fillStyle=s.color+'40';ctx2.fill();
        ctx2.fillStyle=s.color;ctx2.font='700 11px Barlow, sans-serif';ctx2.textAlign='left';
        const labelVal = s.data[lastIdx].value;
        ctx2.fillText(labelVal.toFixed(labelVal < 10 ? 1 : 0), lastX+8, lastY+4);
      });
    }, [chartData]);
    return html`
      <canvas ref=${canvasRef} style=${{width:'100%',height:h+'px',display:'block'}}/>
      <div style=${{display:'flex',gap:'16px',marginTop:'8px',flexWrap:'wrap'}}>
        ${chartData.series.map(s => html`
          <div key=${s.name} style=${{display:'flex',alignItems:'center',gap:'6px',fontSize:'11px',color:C.fgSoft,fontWeight:'500'}}>
            <div style=${{width:'12px',height:'2px',background:s.color,borderRadius:'2px'}}></div>
            ${s.name}
          </div>
        `)}
      </div>
    `;
  };

  // ===== Styles =====
  var navItem = function(active) { return { padding:'11px 18px', margin:'2px 12px', borderRadius:'10px', cursor:'pointer', display:'flex', alignItems:'center', gap:'12px', fontSize:'14px', fontWeight: active ? '600' : '500', color: active ? '#fff' : C.fg, background: active ? C.accent : 'transparent', transition:'all 0.15s', letterSpacing:'-0.005em', lineHeight:'1.4' }; };
  var tabBtn = function(active) { return { padding:'10px 18px', borderRadius:'8px', border:'none', cursor:'pointer', fontSize:'14px', fontWeight: active ? '600' : '500', background: active ? C.fg : 'transparent', color: active ? '#fff' : C.fgSoft, transition:'all 0.15s', letterSpacing:'-0.005em' }; };

            <div style=${{fontSize:'13px',color:C.fgMuted,marginBottom:'12px',fontWeight:'500'}}>${sources.length} sources</div>

            ${sources.map(function(src) { return html`
              <div key=${src.id} style=${{...card,marginBottom:'10px',cursor:'pointer'}} onClick=${function(){setExpandedSource(expandedSource===src.id?null:src.id)}}>
                <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'20px'}}>
                  <div style=${{flex:1,minWidth:0}}>
                    <div style=${{display:'flex',alignItems:'center',gap:'10px',marginBottom:'4px',flexWrap:'wrap'}}>
                      <span style=${{fontWeight:'700',fontSize:'15px'}}>${src.name}</span>
                      <span style=${{...badge(tierColor(src.tier)),fontSize:'10px'}}>Tier ${src.tier}</span>
                      <span style=${{fontSize:'12px',color:C.fgMuted,fontWeight:'500'}}>${src.type}</span>
                    </div>
                    <div style=${{fontSize:'14px',color:C.fgSoft,lineHeight:'1.6',marginBottom:'8px'}}>${src.description}</div>
                    <div style=${{display:'flex',alignItems:'center',gap:'16px',fontSize:'12px',color:C.fgMuted,flexWrap:'wrap',fontWeight:'500'}}>
                      <span>${src.coverage}</span>
                      <span>Refresh: ${src.frequency}</span>
                      <span>Reliability: ${src.reliability}/5</span>
                      <span style=${{color:src.access==='Public'?C.success:C.warning,fontWeight:'600'}}>${src.access}</span>
                    </div>
                  </div>
                  <a href=${src.url} target="_blank" rel="noopener" onClick=${function(e){e.stopPropagation()}} style=${{display:'flex',alignItems:'center',gap:'4px',padding:'9px 18px',borderRadius:'10px',background:C.accent,color:'#fff',textDecoration:'none',fontSize:'12px',fontWeight:'600',whiteSpace:'nowrap',flexShrink:0}}>
                    Visit \u2197
                  </a>
                </div>

                ${expandedSource===src.id && html`
                  <div style=${{marginTop:'16px',padding:'20px',background:C.bg,borderRadius:'12px'}}>
                    <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'24px'}}>
                      <div>
                        <div style=${{fontSize:'11px',fontWeight:'700',color:C.fgMuted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'6px'}}>Data Provided</div>
                        <div style=${{fontSize:'13px',lineHeight:'1.6',color:C.fgSoft}}>${src.dataProvided}</div>
                      </div>
                      <div>
                        <div style=${{fontSize:'11px',fontWeight:'700',color:C.fgMuted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'6px'}}>Used For</div>
                        <div style=${{display:'flex',gap:'4px',flexWrap:'wrap'}}>
                          ${src.usedFor.map(function(use,i) { return html`<span key=${i} style=${{padding:'4px 10px',borderRadius:'20px',fontSize:'11px',background:C.cardBg,color:C.fgSoft,fontWeight:'500'}}>${use}</span>`; })}
                        </div>
                      </div>
                    </div>
                    <div style=${{marginTop:'12px',fontSize:'12px',color:C.fgSoft}}>
                      Direct link: <a href=${src.url} target="_blank" rel="noopener" style=${{color:C.link,textDecoration:'none',wordBreak:'break-all',fontWeight:'600'}}>${src.url} \u2197</a>
                    </div>
                  </div>
                `}
              </div>
            `; })}
          </div>
        `; })}

        <div style=${{...card,borderLeft:'4px solid '+C.accent,marginTop:'8px'}}>
          <div style=${{fontWeight:'700',fontSize:'15px',marginBottom:'8px'}}>Data Integrity</div>
          <div style=${{fontSize:'14px',color:C.fgSoft,lineHeight:'1.7'}}>
            Every insight in this dashboard is traced back to a specific source with URL, publication date, and reliability rating. <strong>Live</strong> charts pull directly from public APIs (e.g. Eurostat) with 6-hour caching. <strong>Snapshot</strong> charts use manually-curated values from the latest published reports (CEMA, CECE, Google Trends) and are refreshed monthly/quarterly. Tier 1 sources (official associations, government data) are prioritised over Tier 2 (trade media, competitor websites).
          </div>
        </div>
      </div>
    `;
  };

  // Render
  var pages2 = { dashboard: DashboardPage, newsfeed: NewsFeedPage, countries: CountriesPage, competitors: CompetitorsPage, sources: SourcesPage };
  var PageComponent = pages2[page] || DashboardPage;

  return html`
    <div style=${{display:'flex',minHeight:'100vh',background:C.bg,color:C.fg,fontFamily:C.font}}>
      <${SidebarComp} />
      <div style=${{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        <${HeaderComp} />
        <div style=${{flex:1,padding:'24px 40px 48px',overflowY:'auto'}}>
          <div style=${{maxWidth:'1280px',margin:'0 auto'}}>
            <${PageComponent} />
          </div>
        </div>
      </div>
    </div>
  `;
}

render(html`<${App} />`, document.getElementById('root'));

</script>
</body>
</html>
